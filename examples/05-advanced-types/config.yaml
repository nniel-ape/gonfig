server:
  host: "0.0.0.0"
  port: 3000
  read_timeout: "5s"
  write_timeout: "10s"

allowed_origins:
  - "https://example.com"
  - "https://app.example.com"
  - "http://localhost:3000"

rate_limits:
  - 100
  - 500
  - 1000

weights:
  - 0.5
  - 0.3
  - 0.2

labels:
  app: "my-service"
  env: "production"
  team: "platform"
